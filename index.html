<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H.AI와 함께하는 선거 상식 퀴즈</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; background: #0f172a; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
    input:focus { outline: none; }
    button:hover { opacity: 0.88; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 99px; }
    ::-webkit-scrollbar-thumb { background: #c0c8e8; border-radius: 99px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── 문항 DB (30개) ───────────────────────────────────────
    const QUESTIONS = [
      { chosung: "ㅅㅈㅌㅍ",     answer: "사전투표",      hint: "선거일 이전에 미리 투표하는 제도" },
      { chosung: "ㅌㅎㅅㄱㅇㅁㅂ", answer: "통합선거인명부", hint: "전국 어디서나 사전투표가 가능한 이유" },
      { chosung: "ㄱㄴㅅㄱㅇ",   answer: "관내선거인",    hint: "해당 구·시·군 관할 구역 내 주소를 둔 투표자" },
      { chosung: "ㄱㅇㅅㄱㅇ",   answer: "관외선거인",    hint: "다른 지역에서 사전투표를 하는 투표자" },
      { chosung: "ㅎㅅㅇㅂㅌ",   answer: "회송용봉투",    hint: "관외 선거인이 투표지를 우편 발송할 때 쓰는 것" },
      { chosung: "ㅌㅂㅈㅂㄹㄱ",  answer: "투표지분류기",  hint: "기표 모양과 위치를 인식해 자동으로 분류하는 장치" },
      { chosung: "ㅌㅂㅊㄱㅇ",   answer: "투표참관인",    hint: "투표 과정을 감시하는 정당·후보자 측 대표자" },
      { chosung: "ㄱㅍㅊㄱㅇ",   answer: "개표참관인",    hint: "개표 과정을 지켜보고 동영상 촬영도 할 수 있는 사람" },
      { chosung: "ㅌㅂㄱㄹㅈ",   answer: "특수봉인지",    hint: "한 번 뜯으면 훼손 흔적이 남는 특수 스티커" },
      { chosung: "ㅅㅅㅈㄱㅂ",   answer: "심사집계부",    hint: "투표지를 수작업으로 한 장씩 재확인하는 개표 단계" },
      { chosung: "ㅍㅈㅁ",       answer: "폐쇄망",        hint: "개표 결과를 입력하는 보안 전산망의 형태" },
      { chosung: "ㅇㅈㅌㅍ",     answer: "이중투표",      hint: "투표 이력 기록으로 원천 차단되는 행위" },
      { chosung: "ㄱㅍㅅㅎㅍ",   answer: "개표상황표",    hint: "후보자별 득표수가 기록되는 공식 문서" },
      { chosung: "ㅇㅂㅌㅍㅎ",   answer: "우편투표함",    hint: "회송용 봉투를 접수해 넣어두는 함" },
      { chosung: "ㅎㅅㄱㅊ",     answer: "호송경찰",      hint: "투표함 이송 시 함께 동행하는 경찰관" },
      { chosung: "ㅁㅎㅍ",       answer: "무효표",        hint: "기표 이상으로 유효하지 않은 투표지" },
      { chosung: "ㅅㄱㄱㄹㅇㅇ",  answer: "선거관리위원",  hint: "최종 검열 후 개표상황표에 서명·날인하는 사람" },
      { chosung: "ㄱㅍㅅ",       answer: "개표소",        hint: "투표함이 모여 개표가 이루어지는 장소" },
      { chosung: "ㅅㅅㄱㅅㄱ",   answer: "심사계수기",    hint: "분류 오류가 없는지 다시 확인할 때 사용하는 기계" },
      { chosung: "ㄱㅍㅂㄱ",     answer: "개표보고",      hint: "득표수를 전산 시스템에 입력하는 단계" },
      { chosung: "ㅅㄱㅈㅎㅅㅎㅅ", answer: "선거종합상황실", hint: "선거 관리 체제 돌입 시 중앙선관위가 개소하는 곳" },
      { chosung: "ㅅㄱㅂㅂ",     answer: "선거벽보",      hint: "통행이 많은 건물 외벽에 부착하는 선거 홍보물" },
      { chosung: "ㅅㄱㄱㅂ",     answer: "선거공보",      hint: "각 세대로 발송되는 후보자 홍보 책자" },
      { chosung: "ㄱㅅㅌㅍ",     answer: "거소투표",      hint: "거동이 어려운 유권자가 집에서 하는 투표" },
      { chosung: "ㅇㅂㅌㅍㄱㅂㄱ", answer: "우편투표개봉기", hint: "회송용 봉투를 효율적으로 개봉하는 장비" },
      { chosung: "ㅎㅂㅈㄷㅅ",   answer: "후보자등록",    hint: "선거 전 이틀에 걸쳐 진행되는 공식 절차" },
      { chosung: "ㄱㅍㅊㅇㅅㅁㅇ", answer: "개표책임사무원", hint: "수개표 과정을 집중 교육받는 개표 담당자" },
      { chosung: "ㅌㅍㅇㄴㅁ",   answer: "투표안내문",    hint: "집으로 배달되어 투표소 위치를 알려주는 문서" },
      { chosung: "ㅌㅍㄱㄹㄱ",   answer: "투표관리관",    hint: "투표소의 전반적인 투표 절차를 책임지는 사람" },
      { chosung: "ㄱㅍㄱㅅㅅㅇ",  answer: "개표개시선언",  hint: "위원장이 개표 시작을 공식 알리는 행위" },
    ];

    const TOTAL_TIME = 300; // 5분
    const MEDAL = ["🥇", "🥈", "🥉"];
    const STORAGE_KEY = "hai_quiz_rankings";

    // ── 유틸 ────────────────────────────────────────────────
    function shuffleArray(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function formatTime(sec) {
      const m = String(Math.floor(sec / 60)).padStart(2, "0");
      const s = String(sec % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function getGrade(score, total) {
      const pct = (score / total) * 100;
      if (pct >= 90) return { label: "선거 박사",    emoji: "🏆", color: "#f5c842" };
      if (pct >= 70) return { label: "투표 전문가",  emoji: "🥈", color: "#60b8ff" };
      if (pct >= 50) return { label: "성실한 유권자", emoji: "👍", color: "#6ee7b7" };
      return            { label: "재도전 필요",   emoji: "💪", color: "#ff9aa2" };
    }

    // ── localStorage 랭킹 ────────────────────────────────────
    function loadRankingsFromStorage() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch { return []; }
    }

    function saveRankingToStorage(entry) {
      try {
        const list = loadRankingsFromStorage();
        list.push(entry);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
      } catch {}
    }

    // ── Tab Bar ──────────────────────────────────────────────
    function TabBar({ tab, setTab }) {
      return (
        <div style={S.tabBar}>
          {[["quiz","🗳️ 퀴즈"],["ranking","🏆 랭킹"]].map(([t, label]) => (
            <button key={t} onClick={() => setTab(t)}
              style={{ ...S.tabBtn, ...(tab === t ? S.tabBtnActive : {}) }}>
              {label}
            </button>
          ))}
        </div>
      );
    }

    // ── Timer Bar ────────────────────────────────────────────
    function TimerBar({ timeLeft }) {
      const pct = (timeLeft / TOTAL_TIME) * 100;
      const urgent  = timeLeft <= 60;
      const warning = timeLeft <= 180;
      const color   = urgent ? "#ef4444" : warning ? "#f59e0b" : "#2d5be3";
      const barBg   = urgent
        ? "linear-gradient(90deg,#ef4444,#f97316)"
        : warning
        ? "linear-gradient(90deg,#f59e0b,#fbbf24)"
        : "linear-gradient(90deg,#2d5be3,#7c4dff)";
      return (
        <div style={{ marginBottom: 16 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5 }}>
            <span style={{ fontSize:12, color:"#888", fontWeight:600 }}>⏱ 타임어택</span>
            <span style={{ fontSize:20, fontWeight:900, color, letterSpacing:1,
              animation: urgent ? "pulse 0.8s infinite" : "none" }}>
              {formatTime(timeLeft)}
            </span>
          </div>
          <div style={{ height:8, borderRadius:99, background:"#eef0f8", overflow:"hidden" }}>
            <div style={{ height:"100%", borderRadius:99, background:barBg,
              width:`${pct}%`, transition:"width 1s linear, background 0.5s" }} />
          </div>
        </div>
      );
    }

    // ── Quiz ─────────────────────────────────────────────────
    function Quiz({ onFinish }) {
      const [shuffled]              = useState(() => shuffleArray(QUESTIONS));
      const [currentIdx, setCurrentIdx] = useState(0);
      const [input, setInput]       = useState("");
      const [status, setStatus]     = useState(null);
      const [showAnswer, setShowAnswer] = useState(false);
      const [score, setScore]       = useState(0);
      const [shake, setShake]       = useState(false);
      const [timeLeft, setTimeLeft] = useState(TOTAL_TIME);
      const [timeUp, setTimeUp]     = useState(false);
      const inputRef   = useRef(null);
      const scoreRef   = useRef(0);
      const resultsRef = useRef([]);

      useEffect(() => {
        const id = setInterval(() => {
          setTimeLeft(t => {
            if (t <= 1) { clearInterval(id); setTimeUp(true); return 0; }
            return t - 1;
          });
        }, 1000);
        return () => clearInterval(id);
      }, []);

      useEffect(() => {
        if (timeUp) onFinish(scoreRef.current, resultsRef.current, true, TOTAL_TIME);
      }, [timeUp]);

      useEffect(() => { inputRef.current && inputRef.current.focus(); }, [currentIdx]);

      function record(entry) { resultsRef.current = [...resultsRef.current, entry]; }

      function handleSubmit() {
        if (!input.trim() || status === "correct" || showAnswer) return;
        const correct = input.trim() === shuffled[currentIdx].answer;
        if (correct) {
          scoreRef.current += 1;
          setScore(scoreRef.current);
          setStatus("correct");
          record({ ...shuffled[currentIdx], correct: true });
          setTimeout(() => next(), 900);
        } else {
          setStatus("wrong");
          setShake(true);
          setTimeout(() => setShake(false), 450);
        }
      }

      function handleSkip() {
        if (showAnswer) return;
        setShowAnswer(true);
        record({ ...shuffled[currentIdx], correct: false });
        setTimeout(() => next(), 1500);
      }

      function next() {
        setInput(""); setStatus(null); setShowAnswer(false);
        if (currentIdx + 1 >= shuffled.length) {
          onFinish(scoreRef.current, resultsRef.current, false, TOTAL_TIME - timeLeft);
        } else {
          setCurrentIdx(i => i + 1);
        }
      }

      function handleKey(e) {
        if (e.key === "Enter" && (!status || status === "wrong")) handleSubmit();
      }

      const q = shuffled[currentIdx];
      const progress = (currentIdx / shuffled.length) * 100;
      const cLen = q.chosung.length;
      const cSize = cLen >= 7 ? 19 : cLen >= 6 ? 22 : cLen >= 5 ? 26 : cLen >= 4 ? 30 : 34;
      const cSpacing = cLen >= 6 ? 6 : cLen >= 4 ? 9 : 14;

      return (
        <div>
          <TimerBar timeLeft={timeLeft} />

          <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#aaa", marginBottom:5 }}>
            <span style={{ fontWeight:700, color:"#2d5be3" }}>{currentIdx + 1} / {shuffled.length}</span>
            <span>점수 <strong style={{ color:"#2d5be3" }}>{score}점</strong></span>
          </div>
          <div style={S.progressBar}>
            <div style={{ ...S.progressFill, width:`${progress}%` }} />
          </div>

          <div style={{ ...S.questionBox, marginTop:14 }}>
            <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:14, flexWrap:"wrap" }}>
              <span style={{ fontSize:11, color:"#aaa", fontWeight:700, whiteSpace:"nowrap" }}>Q{currentIdx + 1}</span>
              <span style={{ fontSize:14, color:"#444", fontWeight:500, lineHeight:1.5 }}>💡 {q.hint}</span>
            </div>
            <div style={S.chosungWrap}>
              <span style={{ ...S.chosung, fontSize:cSize, letterSpacing:cSpacing }}>
                {q.chosung.split("").join(" ")}
              </span>
            </div>
            <div style={{ fontSize:12, color:"#bbb", textAlign:"center" }}>
              정답 <strong style={{ color:"#888" }}>{q.answer.length}글자</strong>
            </div>
          </div>

          <div style={{ position:"relative", marginBottom:10, marginTop:14 }}>
            <input
              ref={inputRef}
              value={input}
              onChange={e => { setInput(e.target.value); if (status === "wrong") setStatus(null); }}
              onKeyDown={handleKey}
              disabled={status === "correct" || showAnswer}
              placeholder="정답 입력 후 Enter"
              style={{
                ...S.input,
                animation: shake ? "shake 0.4s" : "none",
                borderColor: status === "correct" ? "#2ecc71" : status === "wrong" ? "#e74c3c" : "#dde3f0",
                background:  status === "correct" ? "#f0fff4" : status === "wrong" ? "#fff5f5" : "#f8faff",
              }}
            />
            {status && (
              <span style={{ position:"absolute", right:14, top:"50%", transform:"translateY(-50%)", fontSize:18 }}>
                {status === "correct" ? "✅" : "❌"}
              </span>
            )}
          </div>

          {status === "correct" && (
            <div style={{ ...S.feedback, background:"#e8f5e9", color:"#2e7d32", borderColor:"#a5d6a7" }}>
              🎉 정답! <strong>{q.answer}</strong>
            </div>
          )}
          {status === "wrong" && !showAnswer && (
            <div style={{ ...S.feedback, background:"#fff8e1", color:"#e65100", borderColor:"#ffe082" }}>
              😅 다시 도전하거나 포기하세요
            </div>
          )}
          {showAnswer && (
            <div style={{ ...S.feedback, background:"#fce4ec", color:"#880e4f", borderColor:"#f48fb1" }}>
              💡 정답: <strong>{q.answer}</strong>
            </div>
          )}

          {!showAnswer && status !== "correct" && (
            <div style={{ display:"flex", gap:8, marginTop:12 }}>
              <button style={{ ...S.btnPrimary, flex:2 }} onClick={handleSubmit}>✔ 제출</button>
              <button style={{ ...S.btnGhost, flex:1 }} onClick={handleSkip}>포기 😢</button>
            </div>
          )}
        </div>
      );
    }

    // ── Result ───────────────────────────────────────────────
    function Result({ score, results, nickname, timeUsed, timeUp, onRestart, onViewRanking }) {
      const answered = results.length;
      const g = getGrade(score, QUESTIONS.length);
      const mins = Math.floor(timeUsed / 60);
      const secs = timeUsed % 60;

      useEffect(() => {
        saveRankingToStorage({
          nickname, score, timeUsed, timeUp,
          answered, total: QUESTIONS.length,
          time: Date.now(),
          pct: Math.round((score / QUESTIONS.length) * 100),
        });
      }, []);

      return (
        <div>
          <div style={{ textAlign:"center", padding:"4px 0 18px" }}>
            <div style={{ fontSize:48 }}>{timeUp ? "⏰" : g.emoji}</div>
            <div style={{ fontSize:20, fontWeight:900, color:"#1a1a2e", marginTop:6 }}>
              {timeUp ? "시간 초과!" : g.label}
            </div>
            <div style={{ fontSize:13, color:"#999", marginTop:2 }}>{nickname}님의 결과</div>

            <div style={{ display:"flex", justifyContent:"center", gap:16, marginTop:18, marginBottom:4 }}>
              {[
                [score, "정답 수"],
                [answered, "시도 문항"],
              ].map(([val, label]) => (
                <div key={label} style={S.statBox}>
                  <div style={S.statVal}>{val}</div>
                  <div style={S.statLabel}>{label}</div>
                </div>
              ))}
              <div style={S.statBox}>
                <div style={{ ...S.statVal, fontSize:18 }}>{mins}분{secs}초</div>
                <div style={S.statLabel}>소요 시간</div>
              </div>
            </div>

            <div style={{
              display:"inline-block", marginTop:8,
              background: g.color+"22", border:`1.5px solid ${g.color}`,
              borderRadius:20, padding:"4px 16px",
              color:g.color, fontWeight:700, fontSize:14,
            }}>
              정답률 {Math.round((score / QUESTIONS.length) * 100)}%
            </div>
          </div>

          <div style={{ maxHeight:200, overflowY:"auto", marginBottom:14, borderRadius:12, border:"1px solid #eee" }}>
            {results.map((r, i) => (
              <div key={i} style={{
                display:"flex", alignItems:"center", gap:8,
                padding:"7px 12px", fontSize:12,
                background: r.correct ? "#f0fff4" : "#fff5f5",
                borderBottom: i < results.length-1 ? "1px solid #f0f0f0" : "none",
              }}>
                <span>{r.correct ? "✅" : "❌"}</span>
                <span style={{ flex:1, color:"#555" }}>{r.hint}</span>
                <span style={{ fontWeight:700, color: r.correct ? "#2e7d32" : "#c62828", whiteSpace:"nowrap" }}>{r.answer}</span>
              </div>
            ))}
            {answered < QUESTIONS.length && (
              <div style={{ padding:"7px 12px", fontSize:12, color:"#bbb", textAlign:"center", background:"#fafafa" }}>
                … 시간 초과로 {QUESTIONS.length - answered}문항 미시도
              </div>
            )}
          </div>

          <div style={{ display:"flex", gap:8 }}>
            <button style={{ ...S.btnPrimary, flex:1 }} onClick={onRestart}>🔄 다시 도전</button>
            <button style={{ ...S.btnOutline, flex:1 }} onClick={onViewRanking}>🏆 랭킹 보기</button>
          </div>
          <div style={{ textAlign:"center", fontSize:11, color:"#bbb", marginTop:8 }}>✓ 랭킹에 저장되었습니다</div>
        </div>
      );
    }

    // ── Ranking Board ────────────────────────────────────────
    function RankingBoard({ myScore, myNickname }) {
      const [rankings, setRankings] = useState([]);

      function load() {
        const list = loadRankingsFromStorage()
          .sort((a, b) => b.score - a.score || a.timeUsed - b.timeUsed)
          .slice(0, 20);
        setRankings(list);
      }

      useEffect(() => { load(); }, [myScore]);

      const myRank = myNickname
        ? rankings.findIndex(r => r.nickname === myNickname && r.score === myScore) + 1
        : null;

      return (
        <div>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
            <div style={{ fontSize:17, fontWeight:900, color:"#1a1a2e" }}>🏆 명예의 전당</div>
            <button style={S.refreshBtn} onClick={load}>↻ 새로고침</button>
          </div>
          <div style={{ fontSize:11, color:"#bbb", marginBottom:10, textAlign:"right" }}>
            기준: 정답 수 多 · 동점 시 소요 시간 少
          </div>

          {myScore !== null && myNickname && (
            <div style={S.myScoreBanner}>
              <span>내 점수</span>
              <strong style={{ color:"#2d5be3", fontSize:17 }}>{myScore}점</strong>
              {myRank > 0 && <span style={S.myRankBadge}>#{myRank}위</span>}
            </div>
          )}

          {rankings.length === 0 ? (
            <div style={S.centerText}>아직 기록이 없어요. 첫 번째 도전자가 되어보세요! 🎯</div>
          ) : (
            rankings.map((r, i) => {
              const isMe = myNickname && r.nickname === myNickname && r.score === myScore;
              const g = getGrade(r.score, QUESTIONS.length);
              const m = Math.floor(r.timeUsed / 60), s = r.timeUsed % 60;
              return (
                <div key={i} style={{
                  ...S.rankRow,
                  background: isMe ? "linear-gradient(90deg,#e8f0ff,#f3eeff)" : i%2===0 ? "#fafbff" : "#fff",
                  border: isMe ? "1.5px solid #2d5be3" : "1.5px solid transparent",
                }}>
                  <div style={S.rankNum}>
                    {i < 3
                      ? <span style={{ fontSize:20 }}>{MEDAL[i]}</span>
                      : <span style={S.rankNumText}>{i+1}</span>}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={S.rankName}>
                      {r.nickname}
                      {isMe && <span style={S.meBadge}>나</span>}
                      {r.timeUp && <span style={{ fontSize:10, color:"#ef4444", marginLeft:4 }}>시간초과</span>}
                    </div>
                    <div style={S.rankMeta}>{g.emoji} {g.label} · {m}분 {s}초</div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={S.rankScore}>{r.score}<span style={{ fontSize:11, fontWeight:400, color:"#ccc" }}>/{QUESTIONS.length}</span></div>
                    <div style={S.rankPct}>{Math.round((r.score/QUESTIONS.length)*100)}%</div>
                  </div>
                </div>
              );
            })
          )}
        </div>
      );
    }

    // ── Nickname Screen ──────────────────────────────────────
    function NicknameScreen({ onStart }) {
      const [name, setName] = useState("");
      return (
        <div style={{ textAlign:"center", padding:"12px 0 8px" }}>
          <div style={{ fontSize:48, marginBottom:10 }}>🗳️</div>
          <h2 style={{ fontWeight:900, fontSize:21, color:"#1a1a2e", margin:"0 0 4px" }}>선거 상식 초성게임</h2>
          <p style={{ fontSize:13, color:"#888", lineHeight:1.75, marginBottom:6 }}>
            선거 투·개표 절차를 얼마나 알고 있나요?
          </p>
          <div style={S.ruleBox}>
            <div style={S.ruleRow}><span>📋</span><span>총 <strong>30문항</strong> (영상 1·2 통합)</span></div>
            <div style={S.ruleRow}><span>⏱</span><span>제한 시간 <strong>5분</strong> (타임어택)</span></div>
            <div style={S.ruleRow}><span>🏆</span><span>정답 수 多 → 소요 시간 少 순으로 랭킹</span></div>
            <div style={S.ruleRow}><span>💾</span><span>랭킹은 <strong>이 브라우저</strong>에 저장됩니다</span></div>
          </div>
          <div style={{ marginBottom:14, textAlign:"left" }}>
            <label style={{ fontSize:13, color:"#666", fontWeight:600, display:"block", marginBottom:5 }}>
              닉네임 (랭킹 등록용)
            </label>
            <input
              value={name}
              onChange={e => setName(e.target.value)}
              onKeyDown={e => e.key === "Enter" && name.trim() && onStart(name.trim())}
              placeholder="예: 투표왕123"
              maxLength={10}
              style={S.input}
            />
            <div style={{ fontSize:11, color:"#bbb", marginTop:4 }}>* 최대 10자</div>
          </div>
          <button
            style={{ ...S.btnPrimary, opacity: name.trim() ? 1 : 0.45, cursor: name.trim() ? "pointer" : "default" }}
            onClick={() => name.trim() && onStart(name.trim())}
          >
            시작하기 →
          </button>
        </div>
      );
    }

    // ── App Root ─────────────────────────────────────────────
    function App() {
      const [tab, setTab]           = useState("quiz");
      const [phase, setPhase]       = useState("nickname");
      const [nickname, setNickname] = useState("");
      const [finalScore, setFinalScore]     = useState(null);
      const [finalResults, setFinalResults] = useState([]);
      const [finalTimeUsed, setFinalTimeUsed] = useState(0);
      const [finalTimeUp, setFinalTimeUp]   = useState(false);

      function startGame(name) { setNickname(name); setPhase("playing"); }

      function handleFinish(score, results, timeUp, timeUsed) {
        setFinalScore(score);
        setFinalResults(results);
        setFinalTimeUp(timeUp);
        setFinalTimeUsed(timeUsed);
        setPhase("result");
      }

      function handleRestart() {
        setPhase("playing");
        setFinalScore(null);
        setFinalResults([]);
        setFinalTimeUsed(0);
        setFinalTimeUp(false);
      }

      return (
        <div style={S.root}>
          <div style={S.bgGrad} />
          <div style={S.card}>
            <div style={S.cardHeader}>
              <div style={S.logo}>🤖 H.AI와 함께하는 선거 상식 퀴즈</div>
              {phase !== "nickname" && <TabBar tab={tab} setTab={setTab} />}
            </div>

            {tab === "ranking" ? (
              <RankingBoard myScore={finalScore} myNickname={nickname} />
            ) : (
              <div>
                {phase === "nickname" && <NicknameScreen onStart={startGame} />}
                {phase === "playing"  && <Quiz onFinish={handleFinish} />}
                {phase === "result"   && (
                  <Result
                    score={finalScore}
                    results={finalResults}
                    nickname={nickname}
                    timeUsed={finalTimeUsed}
                    timeUp={finalTimeUp}
                    onRestart={handleRestart}
                    onViewRanking={() => setTab("ranking")}
                  />
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Styles ───────────────────────────────────────────────
    const S = {
      root: {
        minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
        fontFamily:"'Noto Sans KR','Apple SD Gothic Neo',sans-serif",
        position:"relative", padding:"24px 16px",
      },
      bgGrad: {
        position:"fixed", inset:0, zIndex:0,
        background:"linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%)",
      },
      card: {
        position:"relative", zIndex:1,
        background:"rgba(255,255,255,0.97)",
        borderRadius:24, padding:"24px 24px 28px",
        width:"100%", maxWidth:480,
        boxShadow:"0 20px 60px rgba(0,0,0,0.4)",
      },
      cardHeader: {
        display:"flex", alignItems:"center", justifyContent:"space-between",
        marginBottom:18, paddingBottom:14, borderBottom:"1.5px solid #f0f2fa",
      },
      logo: { fontWeight:900, fontSize:13, color:"#2d5be3", letterSpacing:-0.5 },
      tabBar: { display:"flex", gap:3, background:"#f0f2fa", borderRadius:12, padding:3 },
      tabBtn: {
        padding:"5px 12px", border:"none", borderRadius:9,
        background:"transparent", fontFamily:"inherit",
        fontSize:13, fontWeight:600, color:"#888", cursor:"pointer", transition:"all 0.15s",
      },
      tabBtnActive: { background:"white", color:"#2d5be3", boxShadow:"0 2px 6px rgba(45,91,227,0.15)" },
      progressBar: { height:5, borderRadius:99, background:"#eef0f8", overflow:"hidden", marginBottom:0 },
      progressFill: {
        height:"100%", borderRadius:99,
        background:"linear-gradient(90deg,#2d5be3,#7c4dff)",
        transition:"width 0.4s ease",
      },
      questionBox: {
        background:"#f8faff", borderRadius:14,
        padding:"16px 14px 12px", border:"1.5px solid #e8ecf8",
      },
      chosungWrap: {
        width:"100%", display:"flex", alignItems:"center", justifyContent:"center",
        padding:"8px 8px 10px", overflow:"visible", minHeight:52,
      },
      chosung: { fontWeight:900, color:"#2d5be3", textAlign:"center", whiteSpace:"nowrap", display:"inline-block" },
      input: {
        width:"100%", padding:"12px 16px", fontSize:15, fontFamily:"inherit",
        borderRadius:12, border:"2px solid #dde3f0", outline:"none",
        boxSizing:"border-box", transition:"border-color 0.2s",
      },
      feedback: { borderRadius:10, padding:"9px 13px", fontSize:13, fontWeight:500, marginBottom:2, border:"1.5px solid transparent" },
      btnPrimary: {
        width:"100%", padding:"13px", borderRadius:12, border:"none",
        background:"linear-gradient(90deg,#2d5be3,#7c4dff)",
        color:"white", fontWeight:700, fontSize:15, cursor:"pointer", fontFamily:"inherit",
      },
      btnGhost: {
        padding:"13px", borderRadius:12, border:"2px solid #e8ecf8",
        background:"white", color:"#888", fontWeight:600, fontSize:14, cursor:"pointer", fontFamily:"inherit",
      },
      btnOutline: {
        width:"100%", padding:"13px", borderRadius:12, border:"2px solid #2d5be3",
        background:"transparent", color:"#2d5be3", fontWeight:700, fontSize:14, cursor:"pointer", fontFamily:"inherit",
      },
      statBox: {
        background:"#f8faff", borderRadius:12, padding:"10px 16px", textAlign:"center",
        border:"1.5px solid #e8ecf8", minWidth:72,
      },
      statVal:   { fontSize:22, fontWeight:900, color:"#2d5be3" },
      statLabel: { fontSize:11, color:"#aaa", marginTop:2 },
      myScoreBanner: {
        display:"flex", alignItems:"center", gap:10,
        background:"linear-gradient(90deg,#e8f0ff,#f3eeff)",
        border:"1.5px solid #c7d7ff", borderRadius:12,
        padding:"10px 14px", marginBottom:10, fontSize:14, fontWeight:600, color:"#555",
      },
      myRankBadge: {
        marginLeft:"auto", background:"#2d5be3", color:"white",
        borderRadius:10, padding:"2px 10px", fontSize:13, fontWeight:700,
      },
      rankRow: {
        display:"flex", alignItems:"center", gap:10,
        padding:"10px 12px", borderRadius:12, marginBottom:5,
      },
      rankNum:     { width:30, textAlign:"center", flexShrink:0 },
      rankNumText: { fontSize:13, fontWeight:700, color:"#ccc" },
      rankName:    { fontSize:14, fontWeight:700, color:"#1a1a2e", display:"flex", alignItems:"center", gap:5 },
      meBadge:     { background:"#2d5be3", color:"white", borderRadius:6, padding:"1px 6px", fontSize:10, fontWeight:700 },
      rankMeta:    { fontSize:11, color:"#999", marginTop:2 },
      rankScore:   { fontSize:17, fontWeight:900, color:"#2d5be3" },
      rankPct:     { fontSize:11, color:"#bbb" },
      centerText:  { textAlign:"center", color:"#bbb", padding:"28px 0", fontSize:14, lineHeight:1.8 },
      refreshBtn: {
        fontSize:12, color:"#888", background:"none",
        border:"1px solid #e0e4f0", borderRadius:8, padding:"4px 10px", cursor:"pointer", fontFamily:"inherit",
      },
      ruleBox: {
        background:"#f8faff", border:"1.5px solid #e8ecf8", borderRadius:14,
        padding:"12px 16px", marginBottom:18, textAlign:"left",
      },
      ruleRow: { display:"flex", gap:10, fontSize:13, color:"#555", padding:"4px 0", alignItems:"flex-start" },
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
