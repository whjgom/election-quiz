// ── 유틸 ─────────────────────────────────────────────────
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(sec) {
  return String(Math.floor(sec/60)).padStart(2,"0") + ":" + String(sec%60).padStart(2,"0");
}

function getGrade(score, total) {
  const p = (score/total)*100;
  if (p >= 90) return { label:"선거 박사",    emoji:"🏆", color:"#f5c842" };
  if (p >= 70) return { label:"투표 전문가",  emoji:"🥈", color:"#60b8ff" };
  if (p >= 50) return { label:"성실한 유권자",emoji:"👍", color:"#6ee7b7" };
  return             { label:"재도전 필요",   emoji:"💪", color:"#ff9aa2" };
}

function loadRankings() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : []; }
  catch { return []; }
}

function saveRanking(entry) {
  try { const l = loadRankings(); l.push(entry); localStorage.setItem(STORAGE_KEY, JSON.stringify(l)); }
  catch {}
}

// ── TimerBar ─────────────────────────────────────────────
function TimerBar({ timeLeft, urgent, warning }) {
  const pct   = (timeLeft / TOTAL_TIME) * 100;
  const color = urgent ? "#ef4444" : warning ? "#f59e0b" : "#2d5be3";
  const barBg = urgent ? "linear-gradient(90deg,#ef4444,#f97316)"
              : warning ? "linear-gradient(90deg,#f59e0b,#fbbf24)"
              : "linear-gradient(90deg,#2d5be3,#7c4dff)";
  return (
    <div style={{ marginBottom:16 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5 }}>
        <span style={{ fontSize:12, color:"#888", fontWeight:600 }}>⏱ 타임어택</span>
        <span style={{ fontSize:20, fontWeight:900, color, letterSpacing:1,
          animation: urgent ? "pulse 0.8s infinite" : "none" }}>
          {formatTime(timeLeft)}
        </span>
      </div>
      <div style={{ height:8, borderRadius:99, background:"#eef0f8", overflow:"hidden" }}>
        <div style={{ height:"100%", borderRadius:99, background:barBg,
          width:`${pct}%`, transition:"width 1s linear, background 0.5s",
          animation: urgent ? "barPulse 0.6s ease-in-out infinite" : "none" }} />
      </div>
    </div>
  );
}

// ── Quiz ─────────────────────────────────────────────────
function Quiz({ onFinish, paused }) {
  const [shuffled]     = useState(() => shuffleArray(QUESTIONS));
  const [idx, setIdx]  = useState(0);
  const [input, setInput]     = useState("");
  const [status, setStatus]   = useState(null);
  const [showAns, setShowAns] = useState(false);
  const [score, setScore]     = useState(0);
  const [shake, setShake]     = useState(false);
  const [timeLeft, setTimeLeft] = useState(TOTAL_TIME);
  const [timeUp, setTimeUp]   = useState(false);
  const [toast, setToast]     = useState(null);
  const inputRef   = useRef(null);
  const scoreRef   = useRef(0);
  const resultsRef = useRef([]);
  const toastTimer = useRef(null);

  useEffect(() => {
    const id = setInterval(() => {
      if (paused) return;
      setToast(cur => {
        if (!cur) setTimeLeft(t => {
          if (t <= 1) { clearInterval(id); setTimeUp(true); return 0; }
          return t - 1;
        });
        return cur;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [paused]);

  useEffect(() => {
    if (timeUp) onFinish(scoreRef.current, resultsRef.current, true, TOTAL_TIME);
  }, [timeUp]);

  useEffect(() => { inputRef.current && inputRef.current.focus(); }, [idx]);

  function showToast(text, type, onDone) {
    if (toastTimer.current) clearTimeout(toastTimer.current);
    setToast({ text, type, hiding: false });
    toastTimer.current = setTimeout(() => {
      setToast(t => t ? { ...t, hiding: true } : null);
      setTimeout(() => { setToast(null); onDone && onDone(); }, 400);
    }, 2600);
  }

  function record(entry) { resultsRef.current = [...resultsRef.current, entry]; }

  function handleSubmit() {
    if (!input.trim() || status === "correct" || showAns) return;
    const correct = input.trim() === shuffled[idx].answer;
    if (correct) {
      scoreRef.current += 1; setScore(scoreRef.current);
      setStatus("correct");
      record({ ...shuffled[idx], correct: true });
      if (shuffled[idx].explanation) showToast(shuffled[idx].explanation, "correct", next);
      else setTimeout(() => next(), 1000);
    } else {
      setStatus("wrong"); setShake(true);
      setTimeout(() => setShake(false), 450);
    }
  }

  function handleSkip() {
    if (showAns) return;
    setShowAns(true);
    record({ ...shuffled[idx], correct: false });
    if (shuffled[idx].explanation) showToast(shuffled[idx].explanation, "skip", next);
    else setTimeout(() => next(), 1000);
  }

  function next() {
    setInput(""); setStatus(null); setShowAns(false);
    if (idx + 1 >= shuffled.length) onFinish(scoreRef.current, resultsRef.current, false, TOTAL_TIME - timeLeft);
    else setIdx(i => i + 1);
  }

  function handleKey(e) {
    if (e.key === "Enter" && (!status || status === "wrong")) handleSubmit();
  }

  const q        = shuffled[idx];
  const progress = (idx / shuffled.length) * 100;
  const urgent   = timeLeft <= 60;
  const warning  = timeLeft <= 180;
  const cLen     = q.chosung.length;
  const cSize    = cLen >= 7 ? 19 : cLen >= 6 ? 22 : cLen >= 5 ? 26 : cLen >= 4 ? 30 : 34;
  const cSpacing = cLen >= 6 ? 6 : cLen >= 4 ? 9 : 14;

  return (
    <div style={{ position:"relative" }}>
      {urgent && (
        <div style={{ position:"fixed", top:0, right:0, bottom:0, left:0, zIndex:10,
          pointerEvents:"none", background:"rgba(239,68,68,0.13)",
          animation:"alertBlink 0.6s ease-in-out infinite", borderRadius:24 }} />
      )}

      <TimerBar timeLeft={timeLeft} urgent={urgent} warning={warning} />

      <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#aaa", marginBottom:5 }}>
        <span style={{ fontWeight:700, color:"#2d5be3" }}>{idx+1} / {shuffled.length}</span>
        <span>점수 <strong style={{ color:"#2d5be3" }}>{score}점</strong></span>
      </div>
      <div style={S.progBar}><div style={{ ...S.progFill, width:`${progress}%` }} /></div>

      <div style={{ ...S.qBox, marginTop:14 }}>
        <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:14, flexWrap:"wrap" }}>
          <span style={{ fontSize:11, color:"#aaa", fontWeight:700, whiteSpace:"nowrap" }}>Q{idx+1}</span>
          <span style={{ fontSize:14, color:"#444", fontWeight:500, lineHeight:1.5 }}>💡 {q.hint}</span>
        </div>

        {toast && (
          <div style={{
            marginBottom:10,
            background: toast.type === "correct"
              ? "linear-gradient(135deg,#1b5e20,#2e7d32)"
              : "linear-gradient(135deg,#6a1b9a,#880e4f)",
            color:"white", borderRadius:14, padding:"12px 16px",
            animation: toast.hiding ? "toastOut 0.4s ease forwards" : "toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards",
            display:"flex", flexDirection:"column", gap:5,
          }}>
            <div style={{ fontSize:10, fontWeight:700, opacity:0.75, letterSpacing:1 }}>
              {toast.type === "correct" ? "✅ 정답 풀이" : "💡 이런 뜻이에요"}
            </div>
            <div style={{ fontSize:14, fontWeight:700, lineHeight:1.6 }}>📖 {toast.text}</div>
          </div>
        )}

        <div style={S.chosungWrap}>
          <span style={{ ...S.chosung, fontSize:cSize, letterSpacing:cSpacing }}>
            {q.chosung.split("").join(" ")}
          </span>
        </div>
        <div style={{ fontSize:12, color:"#bbb", textAlign:"center" }}>
          정답 <strong style={{ color:"#888" }}>{q.answer.length}글자</strong>
        </div>
      </div>

      <div style={{ position:"relative", marginBottom:10, marginTop:14 }}>
        <input ref={inputRef} value={input}
          onChange={e => { setInput(e.target.value); if (status==="wrong") setStatus(null); }}
          onKeyDown={handleKey}
          disabled={status==="correct" || showAns}
          placeholder="정답 입력 후 Enter"
          style={{ ...S.input,
            animation: shake ? "shake 0.4s" : "none",
            borderColor: status==="correct" ? "#2ecc71" : status==="wrong" ? "#e74c3c" : "#dde3f0",
            background:  status==="correct" ? "#f0fff4" : status==="wrong" ? "#fff5f5" : "#f8faff",
          }}
        />
        {status && (
          <span style={{ position:"absolute", right:14, top:"50%", transform:"translateY(-50%)", fontSize:18 }}>
            {status==="correct" ? "✅" : "❌"}
          </span>
        )}
      </div>

      {status==="correct" && (
        <div style={{ ...S.feedback, background:"#e8f5e9", color:"#2e7d32", borderColor:"#a5d6a7" }}>
          🎉 정답! <strong>{q.answer}</strong>
        </div>
      )}
      {status==="wrong" && !showAns && (
        <div style={{ ...S.feedback, background:"#fff8e1", color:"#e65100", borderColor:"#ffe082" }}>
          😅 다시 도전하거나 포기하세요
        </div>
      )}
      {showAns && (
        <div style={{ ...S.feedback, background:"#fce4ec", color:"#880e4f", borderColor:"#f48fb1" }}>
          💡 정답: <strong>{q.answer}</strong>
        </div>
      )}

      {!showAns && status !== "correct" && (
        <div style={{ display:"flex", gap:8, marginTop:12 }}>
          <button style={{ ...S.btnPrimary, flex:2 }} onClick={handleSubmit}>✔ 제출</button>
          <button style={{ ...S.btnGhost,   flex:1 }} onClick={handleSkip}>포기 😢</button>
        </div>
      )}
    </div>
  );
}

// ── Result ───────────────────────────────────────────────
function Result({ score, results, nickname, timeUsed, timeUp, onRestart, onViewRanking }) {
  const answered = results.length;
  const g    = getGrade(score, QUESTIONS.length);
  const mins = Math.floor(timeUsed / 60);
  const secs = timeUsed % 60;

  useEffect(() => {
    saveRanking({ nickname, score, timeUsed, timeUp, answered,
      total: QUESTIONS.length, time: Date.now(),
      pct: Math.round((score / QUESTIONS.length) * 100) });
  }, []);

  return (
    <div>
      <div style={{ textAlign:"center", padding:"4px 0 18px" }}>
        <div style={{ fontSize:48 }}>{timeUp ? "⏰" : g.emoji}</div>
        <div style={{ fontSize:20, fontWeight:900, color:"#1a1a2e", marginTop:6 }}>
          {timeUp ? "시간 초과!" : g.label}
        </div>
        <div style={{ fontSize:13, color:"#999", marginTop:2 }}>{nickname}님의 결과</div>
        <div style={{ display:"flex", justifyContent:"center", gap:16, marginTop:18, marginBottom:4 }}>
          {[{val:score,label:"정답 수"},{val:answered,label:"시도 문항"}].map(({val,label}) => (
            <div key={label} style={S.statBox}>
              <div style={S.statVal}>{val}</div>
              <div style={S.statLabel}>{label}</div>
            </div>
          ))}
          <div style={S.statBox}>
            <div style={{ ...S.statVal, fontSize:18 }}>{mins}분{secs}초</div>
            <div style={S.statLabel}>소요 시간</div>
          </div>
        </div>
        <div style={{ display:"inline-block", marginTop:8,
          background:g.color+"22", border:`1.5px solid ${g.color}`,
          borderRadius:20, padding:"4px 16px", color:g.color, fontWeight:700, fontSize:14 }}>
          정답률 {Math.round((score/QUESTIONS.length)*100)}%
        </div>
      </div>

      <div style={{ maxHeight:200, overflowY:"auto", marginBottom:14, borderRadius:12, border:"1px solid #eee" }}>
        {results.map((r,i) => (
          <div key={i} style={{ display:"flex", alignItems:"center", gap:8,
            padding:"7px 12px", fontSize:12,
            background: r.correct ? "#f0fff4" : "#fff5f5",
            borderBottom: i < results.length-1 ? "1px solid #f0f0f0" : "none" }}>
            <span>{r.correct ? "✅" : "❌"}</span>
            <span style={{ flex:1, color:"#555" }}>{r.hint}</span>
            <span style={{ fontWeight:700, color:r.correct?"#2e7d32":"#c62828", whiteSpace:"nowrap" }}>{r.answer}</span>
          </div>
        ))}
        {answered < QUESTIONS.length && (
          <div style={{ padding:"7px 12px", fontSize:12, color:"#bbb", textAlign:"center", background:"#fafafa" }}>
            … 시간 초과로 {QUESTIONS.length - answered}문항 미시도
          </div>
        )}
      </div>

      <div style={{ display:"flex", gap:8 }}>
        <button style={{ ...S.btnPrimary, flex:1 }} onClick={onRestart}>🔄 다시 도전</button>
        <button style={{ ...S.btnOutline, flex:1 }} onClick={onViewRanking}>🏆 랭킹 보기</button>
      </div>
      <div style={{ textAlign:"center", fontSize:11, color:"#bbb", marginTop:8 }}>✓ 랭킹에 저장되었습니다</div>
    </div>
  );
}

// ── RankingBoard ─────────────────────────────────────────
function RankingBoard({ myScore, myNickname }) {
  const [rankings, setRankings] = useState([]);

  function load() {
    setRankings(loadRankings().sort((a,b) => b.score-a.score || a.timeUsed-b.timeUsed).slice(0,20));
  }
  useEffect(() => { load(); }, [myScore]);

  const myRank = myNickname
    ? rankings.findIndex(r => r.nickname===myNickname && r.score===myScore) + 1
    : null;

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
        <div style={{ fontSize:17, fontWeight:900, color:"#1a1a2e" }}>🏆 명예의 전당</div>
        <button style={S.refreshBtn} onClick={load}>↻ 새로고침</button>
      </div>
      <div style={{ fontSize:11, color:"#bbb", marginBottom:10, textAlign:"right" }}>
        기준: 정답 수 多 · 동점 시 소요 시간 少
      </div>

      {myScore !== null && myNickname && (
        <div style={S.myBanner}>
          <span>내 점수</span>
          <strong style={{ color:"#2d5be3", fontSize:17 }}>{myScore}점</strong>
          {myRank !== null && myRank > 0 && <span style={S.myRankBadge}>#{myRank}위</span>}
        </div>
      )}

      {rankings.length === 0 ? (
        <div style={S.centerTxt}>아직 기록이 없어요. 첫 번째 도전자가 되어보세요! 🎯</div>
      ) : rankings.map((r,i) => {
        const isMe = !!(myNickname && r.nickname===myNickname && r.score===myScore);
        const g = getGrade(r.score, QUESTIONS.length);
        const m = Math.floor(r.timeUsed/60), s = r.timeUsed%60;
        return (
          <div key={i} style={{ ...S.rankRow,
            background: isMe ? "linear-gradient(90deg,#e8f0ff,#f3eeff)" : i%2===0 ? "#fafbff" : "#fff",
            border: isMe ? "1.5px solid #2d5be3" : "1.5px solid transparent" }}>
            <div style={S.rankNum}>
              {i < 3
                ? <span style={{ fontSize:20 }}>{MEDAL[i]}</span>
                : <span style={S.rankNumTxt}>{i+1}</span>}
            </div>
            <div style={{ flex:1 }}>
              <div style={S.rankName}>
                {r.nickname}
                {isMe && <span style={S.meBadge}>나</span>}
                {r.timeUp && <span style={{ fontSize:10, color:"#ef4444", marginLeft:4 }}>시간초과</span>}
              </div>
              <div style={S.rankMeta}>{g.emoji} {g.label} · {m}분 {s}초</div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={S.rankScore}>{r.score}<span style={{ fontSize:11, fontWeight:400, color:"#ccc" }}>/{QUESTIONS.length}</span></div>
              <div style={S.rankPct}>{Math.round((r.score/QUESTIONS.length)*100)}%</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── NicknameScreen ───────────────────────────────────────
function NicknameScreen({ onStart }) {
  const [name, setName] = useState("");
  return (
    <div style={{ textAlign:"center", padding:"12px 0 8px" }}>
      <div style={{ fontSize:48, marginBottom:10 }}>🗳️</div>
      <h2 style={{ fontWeight:900, fontSize:21, color:"#1a1a2e", margin:"0 0 4px" }}>선거 상식 초성게임</h2>
      <p style={{ fontSize:13, color:"#888", lineHeight:1.75, marginBottom:6 }}>
        선거 투·개표 절차를 얼마나 알고 있나요?
      </p>
      <div style={S.ruleBox}>
        <div style={S.ruleRow}><span>📋</span><span>총 <strong>30문항</strong></span></div>
        <div style={S.ruleRow}><span>⏱</span><span>제한 시간 <strong>5분</strong> (타임어택)</span></div>
        <div style={S.ruleRow}><span>🏆</span><span>정답 수 多 → 소요 시간 少 순으로 랭킹</span></div>
        <div style={S.ruleRow}><span>💾</span><span>랭킹은 <strong>이 브라우저</strong>에 저장됩니다</span></div>
      </div>
      <div style={{ marginBottom:14, textAlign:"left" }}>
        <label style={{ fontSize:13, color:"#666", fontWeight:600, display:"block", marginBottom:5 }}>
          닉네임 (랭킹 등록용)
        </label>
        <input value={name}
          onChange={e => setName(e.target.value)}
          onKeyDown={e => e.key==="Enter" && name.trim() && onStart(name.trim())}
          placeholder="예: 투표왕123" maxLength={10}
          style={{ ...S.input, color:"#1a1a2e" }}
        />
        <div style={{ fontSize:11, color:"#bbb", marginTop:4 }}>* 최대 10자</div>
      </div>
      <button
        style={{ ...S.btnPrimary, opacity:name.trim()?1:0.45, cursor:name.trim()?"pointer":"default" }}
        onClick={() => name.trim() && onStart(name.trim())}>
        시작하기 →
      </button>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────
function App() {
  const [tab, setTab]         = useState("quiz");
  const [phase, setPhase]     = useState("nickname");
  const [nickname, setNickname] = useState("");
  const [finalScore, setFinalScore]     = useState(null);
  const [finalResults, setFinalResults] = useState([]);
  const [finalTimeUsed, setFinalTimeUsed] = useState(0);
  const [finalTimeUp, setFinalTimeUp]   = useState(false);

  function startGame(name) { setNickname(name); setPhase("playing"); }

  function handleFinish(score, results, timeUp, timeUsed) {
    setFinalScore(score); setFinalResults(results);
    setFinalTimeUp(timeUp); setFinalTimeUsed(timeUsed);
    setPhase("result");
  }

  function handleRestart() {
    setPhase("playing"); setFinalScore(null);
    setFinalResults([]); setFinalTimeUsed(0); setFinalTimeUp(false);
  }

  return (
    <div style={S.root}>
      <div style={S.bgGrad} />
      <div style={S.card}>
        <div style={S.cardHeader}>
          <div style={S.logo}>🤖 H.AI와 함께하는 선거 상식 퀴즈</div>
          {phase !== "nickname" && <TabBar tab={tab} setTab={setTab} />}
        </div>

        <div style={{ display: tab==="ranking" ? "block" : "none" }}>
          <RankingBoard myScore={finalScore} myNickname={nickname} />
        </div>

        <div style={{ display: tab==="ranking" ? "none" : "block" }}>
          {phase==="nickname" && <NicknameScreen onStart={startGame} />}
          {phase==="playing"  && <Quiz onFinish={handleFinish} paused={tab==="ranking"} />}
          {phase==="result"   && (
            <Result
              score={finalScore ?? 0}
              results={finalResults}
              nickname={nickname}
              timeUsed={finalTimeUsed}
              timeUp={finalTimeUp}
              onRestart={handleRestart}
              onViewRanking={() => setTab("ranking")}
            />
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
